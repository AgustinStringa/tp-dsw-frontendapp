<div class="modal-overlay d-flex align-items-center justify-content-center">
  <div class="modal-content bg-white p-3 rounded shadow-lg">
    <div class="container mt-3">
      <div class="modal-header">
        <h1 class="text-center">Calculadora de IMC</h1>
      </div>
  <form class="mt-10">
    <div class="mb-3">
      <label for="weight" class="form-label">Peso (kg)</label>
      <input type="number" class="form-control w-100" [(ngModel)]="weight" name="weight" id="weight"
        placeholder="Ingresa tu peso en kilogramos" required />
    </div>
    <div class="mb-3">
      <label for="height" class="form-label">Altura (m)</label>
      <input type="number" step="0.01" class="form-control" [(ngModel)]="height" name="height" id="height"
        placeholder="Ingresa tu altura en metros" required />
    </div>
    <button type="button" class="btn btn-primary w-100" (click)="calculateIMC()">
      Calcular IMC
    </button>
  </form>
</div>
</div>
</div>

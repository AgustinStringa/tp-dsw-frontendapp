<h2 mat-dialog-title>Correo electrónico enviado a {{ data.email }}</h2>
<mat-dialog-content>
  <p>
    Se ha enviado un correo electrónico a la dirección de correo asociada a esta
    cuenta. Revisa tu bandeja de entrada para completar el proceso de cambio de
    contraseña.
  </p>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="closeDialog()">Ok</button>
</mat-dialog-actions>
